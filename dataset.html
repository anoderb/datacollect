<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kamera Dataset — Tokiva</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- TOP HEADER -->
  <header class="header">
    <div class="logo">
      <span>📸</span> Dataset <span>Collector</span>
    </div>
    <div class="header-actions">
      <button id="download-zip-desktop-btn" class="btn btn-secondary btn-sm header-desktop-only">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download ZIP
      </button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container">
    
    <!-- DETAIL HEADER -->
    <div class="detail-header">
      <a href="/" class="back-btn" id="back-to-home-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <div class="detail-title">
        <h2 id="dataset-title-display">Nama Produk</h2>
        <p id="dataset-subtitle-display">Memuat detail produk...</p>
      </div>
    </div>

    <!-- CAMERA INTERFACE -->
    <section class="camera-section">
      <div class="camera-container">
        
        <!-- Video Stream -->
        <video id="camera-video" class="camera-video" autoplay playsinline muted></video>
        
        <!-- Photographic Grid Lines Overlay -->
        <div class="camera-overlay">
          <div class="camera-grid">
            <div class="camera-grid-v1"></div>
            <div class="camera-grid-v2"></div>
          </div>
        </div>

        <!-- Camera Status Overlay (Loading/Error states) -->
        <div id="camera-status" class="camera-status-overlay loading">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="loading-spinner"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
          <h3 id="camera-status-title">Memulai Kamera...</h3>
          <p id="camera-status-message">Silakan berikan izin akses kamera jika diminta browser.</p>
          <button id="camera-retry-btn" class="btn btn-primary btn-sm d-none mt-4">Coba Lagi</button>
        </div>

        <!-- Camera Control Bar (Shutter, Toggle) -->
        <div class="camera-controls">
          <!-- Left side blank for centering shutter -->
          <div style="width: 44px;"></div>
          
          <!-- Shutter Shutter Trigger Button -->
          <button id="camera-shutter-btn" class="shutter-btn" aria-label="Ambil foto">
            <div class="shutter-btn-inner"></div>
          </button>
          
          <!-- Camera Swap Toggle Button (Front/Back) -->
          <button id="camera-swap-btn" class="camera-swap-btn" aria-label="Ganti kamera">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
          </button>
        </div>

      </div>
    </section>

    <!-- PHOTO GALLERY GRID -->
    <section class="gallery-section">
      <div class="gallery-section-header">
        <h3>Galeri Dataset</h3>
        <div id="gallery-count" class="gallery-count">0 Foto</div>
      </div>
      
      <!-- Photos Thumbnail grid -->
      <div id="thumbnail-grid" class="thumbnail-grid">
        <!-- Load items dynamically -->
      </div>
    </section>

    <!-- Mobile-only floating ZIP download button at bottom of container -->
    <div class="mt-4 @media (min-width: 768px) { d-none }">
      <button id="download-zip-mobile-btn" class="btn btn-secondary" style="width: 100%;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Unduh Dataset ZIP
      </button>
    </div>

  </main>

  <!-- MOBILE BOTTOM NAVIGATION (Matches Home nav but highlighted appropriately) -->
  <nav class="bottom-nav">
    <a href="/" class="bottom-nav-item" id="nav-home">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="/" class="bottom-nav-item" id="nav-add-dataset">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Tambah</span>
    </a>
  </nav>

  <!-- TOAST NOTIFICATION CONTAINER -->
  <div id="toast-container" class="toast-container"></div>

  <!-- DETAIL ENTRY JS -->
  <script type="module" src="/js/dataset-detail.js"></script>
</body>
</html>
